<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Solid Analytics — Live</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#070c18;color:#e8edf5;font-family:Inter,-apple-system,system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}
.header{background:linear-gradient(90deg,#0a1628,#0d1f3c);padding:16px;text-align:center;border-bottom:1px solid #1e2d4a}
.header h1{font-size:11px;font-family:monospace;letter-spacing:3px;color:#34c967;margin-bottom:4px}
.header .sub{font-size:9px;color:#7a90aa;font-family:monospace}
.status-bar{text-align:center;padding:8px;font-family:monospace;font-size:10px;letter-spacing:2px}
.status-live{color:#34c967;animation:pulse 2s infinite}
.status-ht{color:#f0c040}
.status-ft{color:#ff3355}
.status-pre{color:#7a90aa}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

.score-board{padding:24px 16px;text-align:center}
.teams{display:flex;justify-content:center;align-items:center;gap:20px;margin-bottom:16px}
.team-name{font-size:13px;font-weight:700;font-family:monospace;letter-spacing:1px}
.team-home .team-name{color:#34c967}
.team-away .team-name{color:var(--away-col,#f0c040)}
.vs{color:#7a90aa;font-size:10px;font-family:monospace}
.score-line{display:flex;justify-content:center;align-items:baseline;gap:16px;margin-bottom:6px}
.score{font-size:36px;font-weight:900;font-family:monospace}
.score-home{color:#34c967}
.score-away{color:var(--away-col,#f0c040)}
.score-vs{color:#7a90aa;font-size:14px}
.frees{font-size:12px;color:#7a90aa;font-family:monospace;margin-bottom:4px}
.two-pt{font-size:10px;color:#cc44ff;font-family:monospace}
.clock{font-size:16px;font-weight:700;font-family:monospace;color:#34c967;margin-top:12px}

.section{padding:12px 16px;max-width:480px;margin:0 auto;width:100%}
.section-label{font-size:9px;font-family:monospace;letter-spacing:3px;color:#34c967;margin-bottom:10px;text-transform:uppercase;border-bottom:1px solid #1e2d4a;padding-bottom:6px}
.scorers-grid{display:flex;gap:12px}
.scorers-col{flex:1}
.scorers-col-header{font-size:9px;font-family:monospace;color:#7a90aa;margin-bottom:6px;letter-spacing:1px}
.scorer-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1e2d4a11;font-family:monospace;font-size:12px}
.scorer-num{color:#7a90aa;flex:1}
.scorer-score{font-weight:700}
.scorer-score-home{color:#34c967}
.scorer-score-away{color:var(--away-col,#f0c040)}
.scorer-frees{font-size:9px;color:#7a90aa;margin-left:4px}

.events-list{display:flex;flex-direction:column;gap:6px}
.event-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#0f1a2e;border-radius:8px;border:1px solid #1e2d4a}
.event-time{font-size:11px;font-family:monospace;color:#34c967;width:42px;flex-shrink:0}
.event-desc{font-size:12px;flex:1;line-height:1.4}
.event-home{color:#34c967}
.event-away{color:var(--away-col,#f0c040)}

.footer{text-align:center;padding:16px;font-size:8px;font-family:monospace;color:#7a90aa;letter-spacing:2px;margin-top:auto}
.match-info{text-align:center;padding:6px 16px;font-family:monospace;font-size:10px;color:#7a90aa;letter-spacing:1px;line-height:1.8}
.match-info span{margin:0 8px}
.no-data{text-align:center;padding:40px;color:#7a90aa;font-family:monospace;font-size:12px}
</style>
</head>
<body>

function fmt(g, p) {
  return `${g}-${String(p).padStart(2, '0')}`;
}

function fmtClock(secs, period) {
  const display = period === 2 ? secs + 1800 : secs;
  const m = Math.floor(display / 60);
  const s = display % 60;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function renderScorers(scorers, containerId, cssClass) {
  const el = document.getElementById(containerId);
  if (!scorers || scorers.length === 0) {
    el.innerHTML = '<div style="color:#7a90aa;font-size:11px;font-family:monospace">—</div>';
    return;
  }
  const sorted = [...scorers].sort((a, b) => (b.g * 3 + b.p) - (a.g * 3 + a.p));
  el.innerHTML = sorted.map(s => {
    const frees = (s.fg || s.fp) ? `<span class="scorer-frees">(${fmt(s.fg || 0, s.fp || 0)})</span>` : '';
    const twoPt = s.two ? `<span style="color:#cc44ff;font-size:9px;margin-left:4px">·${s.two}x2pt</span>` : '';
    const display = s.name ? `${s.name}` : `#${s.num}`;
    return `<div class="scorer-row">
      <span class="scorer-num">${display}</span>
      <span class="scorer-score ${cssClass}">${fmt(s.g || 0, s.p || 0)}</span>${frees}${twoPt}
    </div>`;
  }).join('');
}

function renderEvents(events) {
  const el = document.getElementById('events');
  if (!events || events.length === 0) {
    el.innerHTML = '<div class="no-data">Waiting for events...</div>';
    return;
  }
  el.innerHTML = events.map(e => {
    const team = e.team === 'h' ? 'home' : 'away';
    return `<div class="event-row">
      <span class="event-time">${e.time}</span>
      <span class="event-desc event-${team}">${e.desc}</span>
    </div>`;
  }).join('');
}

function statusLabel(s) {
  const map = {
    'pre_match': ['PRE-MATCH', 'status-pre'],
    'first_half': ['● LIVE — 1ST HALF', 'status-live'],
    'half_time': ['HALF TIME', 'status-ht'],
    'second_half': ['● LIVE — 2ND HALF', 'status-live'],
    'full_time': ['FULL TIME', 'status-ft']
  };
  return map[s] || ['—', 'status-pre'];
}

        clock_seconds: 0, period: 1,
        home_team: 'Bray Emmets', away_team: 'Opposition',
        home_scorers: '[]', away_scorers: '[]', last_events: '[]',
        status: 'pre_match',
        away_color: '#f0c040',
        match_info: '{}'
      })
    });
    poll(); // refresh immediately
  } catch (err) {
    console.error('Wipe error:', err);
  }
}

async function poll() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/live_match?id=eq.current&select=*`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });
    const rows = await res.json();
    if (!rows || rows.length === 0) return;
    const d = rows[0];

    // Away colour
    if(d.away_color){document.documentElement.style.setProperty('--away-col',d.away_color)}

    // Match info (referee, venue, competition, weather)
    const mi = typeof d.match_info === 'string' ? JSON.parse(d.match_info || '{}') : (d.match_info || {});
    const infoParts = [];
    if(mi.date) infoParts.push(new Date(mi.date+'T12:00').toLocaleDateString('en-IE',{day:'numeric',month:'short',year:'numeric'}));
    if(mi.comp) infoParts.push(mi.comp + (mi.round ? ' · ' + mi.round : ''));
    if(mi.venue) infoParts.push('📍 ' + mi.venue);
    if(mi.referee) infoParts.push('⚖ ' + mi.referee);
    if(mi.weather) infoParts.push(mi.weather);
    document.getElementById('match-info').innerHTML = infoParts.length ? infoParts.map(p => '<span>' + p + '</span>').join('') : '';

    // Status
    const [label, cls] = statusLabel(d.status);
    const statusEl = document.getElementById('status');
    statusEl.textContent = label;
    statusEl.className = `status-bar ${cls}`;

    // Teams
    document.getElementById('home-name').textContent = (d.home_team || 'BRAY EMMETS').toUpperCase();
    document.getElementById('away-name').textContent = (d.away_team || 'OPPOSITION').toUpperCase();

    // Score
    document.getElementById('home-score').textContent = fmt(d.home_goals, d.home_points);
    document.getElementById('away-score').textContent = fmt(d.away_goals, d.away_points);
    document.getElementById('home-frees').textContent = fmt(d.home_free_goals, d.home_free_points);
    document.getElementById('away-frees').textContent = fmt(d.away_free_goals, d.away_free_points);

    // 2-pointers
    const h2 = d.home_2pt ? `${d.home_2pt}x2pt` : '';
    const a2 = d.away_2pt ? `${d.away_2pt}x2pt` : '';
    document.getElementById('home-2pt').textContent = h2;
    document.getElementById('away-2pt').textContent = a2 ? (h2 ? `  ·  ${a2}` : a2) : '';

    // Clock
    if (d.status === 'first_half' || d.status === 'second_half') {
      document.getElementById('clock').textContent = `⏱ ${fmtClock(d.clock_seconds, d.period)}`;
    } else if (d.status === 'half_time') {
      document.getElementById('clock').textContent = 'HALF TIME';
    } else if (d.status === 'full_time') {
      document.getElementById('clock').textContent = 'FULL TIME';
    } else {
      document.getElementById('clock').textContent = '';
    }

    // Scorers
    const hs = typeof d.home_scorers === 'string' ? JSON.parse(d.home_scorers) : (d.home_scorers || []);
    const as = typeof d.away_scorers === 'string' ? JSON.parse(d.away_scorers) : (d.away_scorers || []);
    renderScorers(hs, 'home-scorers', 'scorer-score-home');
    renderScorers(as, 'away-scorers', 'scorer-score-away');

    // Events
    const ev = typeof d.last_events === 'string' ? JSON.parse(d.last_events) : (d.last_events || []);
    renderEvents(ev);

  } catch (err) {
    console.error('Poll error:', err);
  }
}

// Poll immediately, then every 10 seconds
poll();
setInterval(poll, 10000);
</script>
</body>
</html>
