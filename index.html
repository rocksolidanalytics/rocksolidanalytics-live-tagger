      <rect x="0" y="0" width={W} height={H} fill={C.bg}/>
      <rect x={L} y={T} width={R-L} height={B-T} fill="none" stroke={LN} strokeWidth="2" rx="2"/>
      {/* Halfway (no centre circle) */}
      <line x1={MX} y1={T} x2={MX} y2={B} stroke={LN2} strokeWidth="1.5" strokeDasharray="8,5"/>
      {/* 13m / 20m / 45m / 65m lines both ends */}
      <line x1={L13} y1={T} x2={L13} y2={B} stroke={LN3} strokeWidth="0.8"/>
      <line x1={R13} y1={T} x2={R13} y2={B} stroke={LN3} strokeWidth="0.8"/>
      <line x1={L20} y1={T} x2={L20} y2={B} stroke={LN} strokeWidth="1.5"/>
      <line x1={R20} y1={T} x2={R20} y2={B} stroke={LN} strokeWidth="1.5"/>
      <line x1={L45} y1={T} x2={L45} y2={B} stroke={LN2} strokeWidth="1" strokeDasharray="6,4"/>
      <line x1={R45} y1={T} x2={R45} y2={B} stroke={LN2} strokeWidth="1" strokeDasharray="6,4"/>
      <line x1={L65} y1={T} x2={L65} y2={B} stroke={LN3} strokeWidth="0.8" strokeDasharray="4,6"/>
      <line x1={R65} y1={T} x2={R65} y2={B} stroke={LN3} strokeWidth="0.8" strokeDasharray="4,6"/>
      {/* Goal rectangles */}
      <rect x={L} y={MY-GI/2} width={GD} height={GI} fill="none" stroke={LN} strokeWidth="1.5"/>
      <rect x={L} y={MY-GO/2} width={GD+9} height={GO} fill="none" stroke={LN2} strokeWidth="1.2"/>
      <rect x={R-GD} y={MY-GI/2} width={GD} height={GI} fill="none" stroke={LN} strokeWidth="1.5"/>
      <rect x={R-GD-9} y={MY-GO/2} width={GD+9} height={GO} fill="none" stroke={LN2} strokeWidth="1.2"/>
      {/* Small D — 13m arc off the 20m line */}
      <path d={`M${L20},${MY-26} Q${L+0.33*PL},${MY} ${L20},${MY+26}`} fill="none" stroke={LN} strokeWidth="1.3"/>
      <path d={`M${R20},${MY-26} Q${R-0.33*PL},${MY} ${R20},${MY+26}`} fill="none" stroke={LN} strokeWidth="1.3"/>
      {/* BIG 40m arc — sideline to sideline, apex just inside the 45 */}
      <path d={`M${L13},${T+4} Q${L+0.48*PL},${MY} ${L13},${B-4}`} fill="none" stroke={LN} strokeWidth="2"/>
      <path d={`M${R13},${T+4} Q${R-0.48*PL},${MY} ${R13},${B-4}`} fill="none" stroke={LN} strokeWidth="2"/>
      {/* Goalposts H-shape */}
      <line x1={L-2} y1={MY-16} x2={L-2} y2={MY+16} stroke="#fff" strokeWidth="3" strokeLinecap="round"/>
      <line x1={R+2} y1={MY-16} x2={R+2} y2={MY+16} stroke="#fff" strokeWidth="3" strokeLinecap="round"/>
      {/* Tagged event dots with schematic leader lines */}
      {tagged.filter(t=>t.loc).slice(0,40).map(t=>{
        const cx=t.loc.x*W,cy=t.loc.y*H;
        const isScore=["Point","2-Pointer"].includes(t.outcome);
        const isGoal=t.outcome==="Goal";
        const isMiss=!isScore&&!isGoal;
        const col=isGoal?NEON.purple:isScore?NEON.green:NEON.red;
        const goalX=cx<MX?L-2:R+2;
        const wideOff=cy<MY?-26:26;
        const ly2=isMiss?MY+wideOff:MY;
        return <g key={t.id}>
          <line x1={cx} y1={cy} x2={cx+(goalX-cx)*0.3} y2={cy+(ly2-cy)*0.3} stroke={col} strokeWidth="1" opacity="0.45" strokeDasharray="3,3"/>
          <circle cx={cx} cy={cy} r="6" fill={col} opacity="0.15"/>
          <circle cx={cx} cy={cy} r="4" fill={col} stroke="#fff" strokeWidth="0.8"/>
        </g>

      {pendingLoc&&<>
        <circle cx={pendingLoc.x*W} cy={pendingLoc.y*H} r="8" fill={activeTeam==="h"?C.blue:C.gold} stroke="#fff" strokeWidth="2" opacity="0.9"/>
        <circle cx={pendingLoc.x*W} cy={pendingLoc.y*H} r="14" fill="none" stroke={activeTeam==="h"?C.blue:C.gold} strokeWidth="1" opacity="0.4"/>

    </svg>
  }

  // Quick Stats Overlay
  if(showQuickStats){
    const hShots=tagged.filter(t=>t.team==="h"&&(t.ev==="shot"||t.ev==="free"));
    const aShots=tagged.filter(t=>t.team==="a"&&(t.ev==="shot"||t.ev==="free"));
    const hScores=hShots.filter(t=>["Point","2-Pointer","Goal"].includes(t.outcome)).length;
    const aScores=aShots.filter(t=>["Point","2-Pointer","Goal"].includes(t.outcome)).length;
    const hWides=hShots.filter(t=>t.outcome==="Wide").length;const aWides=aShots.filter(t=>t.outcome==="Wide").length;
    const hPL=tagged.filter(t=>t.team==="h"&&t.ev==="poss_lost").length;const aPL=tagged.filter(t=>t.team==="a"&&t.ev==="poss_lost").length;
    const hKO=tagged.filter(t=>t.team==="h"&&t.ev==="kickout");const aKO=tagged.filter(t=>t.team==="a"&&t.ev==="kickout");
    const hKOWon=hKO.filter(t=>["Won Clean","Break Won"].includes(t.outcome)).length;const aKOWon=aKO.filter(t=>["Won Clean","Break Won"].includes(t.outcome)).length;
    const hConv=hShots.length?Math.round(hScores/hShots.length*100):0;const aConv=aShots.length?Math.round(aScores/aShots.length*100):0;
    const qs=[{l:"Shots",h:hShots.length,a:aShots.length},{l:"Scores",h:hScores,a:aScores},{l:"Conversion",h:`${hConv}%`,a:`${aConv}%`},{l:"Wides",h:hWides,a:aWides},{l:"Own KO Won",h:`${hKOWon}/${hKO.length}`,a:`${aKOWon}/${aKO.length}`},{l:"Turnovers",h:hPL,a:aPL}];

          <div><div style={{fontSize:9,color:C.gold,fontFamily:"monospace"}}>OPPOSITION</div><div style={{fontSize:22,fontWeight:900,fontFamily:"monospace"}}>{gaaNotation("a")}</div></div>

      </div>
    </div>
  }

  const tc=activeTeam==="h"?C.blue:activeTeam==="a"?C.gold:C.slate;

  // Pitch shows only when a pitch-event is active and location not yet set
  const showPitch=activeEv?.pitch&&!pendingLoc&&!pendingOutcome;
  // Outcomes show when event selected and (no pitch needed OR location already set)
  const showOutcomes=activeEv&&activeEv.outcomes.length>0&&!pendingOutcome&&((!activeEv.pitch)||pendingLoc);
  const showSubOff=activeEv?.id==="sub"&&!pendingOutcome;

  return <div style={{minHeight:"100vh",background:C.bg,color:C.white,fontFamily:"Inter,-apple-system,system-ui,sans-serif",display:"flex",flexDirection:"column"}}>
    {/* Score bar */}
    <div style={{background:"linear-gradient(90deg,#0a1628,#0d1f3c)",padding:"8px 14px",display:"flex",alignItems:"center",borderBottom:`1px solid ${C.border}`}}>
      <div style={{flex:1,textAlign:"center"}}>

        <div style={{fontSize:18,fontWeight:900,fontFamily:"monospace"}}>{sc("h")} <span style={{fontSize:10,color:C.slate}}>({total("h")})</span></div>
      </div>
      <div style={{textAlign:"center",padding:"0 12px",cursor:"pointer"}} onClick={()=>setShowQuickStats(true)}>
        <div onClick={e=>{e.stopPropagation();setRunning(r=>!r)}} style={{fontSize:20,fontFamily:"monospace",fontWeight:900,color:running?C.greenB:C.slate,cursor:"pointer"}}>{displayClock(clock)}</div>
        <div style={{fontSize:8,fontFamily:"monospace",color:running?C.greenB:C.slate}}>{running?"● LIVE":"⏸ TAP TO START"}</div>
        <div style={{fontSize:8,fontFamily:"monospace",color:C.blue,marginTop:1}}>{period===1?"1ST HALF":"2ND HALF"}</div>
      </div>
      <div style={{flex:1,textAlign:"center"}}>
        <div style={{fontSize:9,color:C.gold,fontFamily:"monospace",letterSpacing:1}}>OPPOSITION</div>
        <div style={{fontSize:18,fontWeight:900,fontFamily:"monospace"}}>{sc("a")} <span style={{fontSize:10,color:C.slate}}>({total("a")})</span></div>
      </div>
    </div>

    {/* Tap hint + undo */}
    <div style={{padding:"4px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{display:"flex",gap:14}}>
        <span style={{fontSize:9,fontFamily:"monospace",color:C.blue}}>● TAP = HOME</span>
        <span style={{fontSize:9,fontFamily:"monospace",color:C.gold}}>●● DBL = OPP</span>
      </div>
      <button onClick={undoLast} disabled={tagged.length===0} style={{fontSize:9,fontFamily:"monospace",color:tagged.length?C.red:C.slate,background:"none",border:"none",cursor:tagged.length?"pointer":"default",opacity:tagged.length?1:0.3,padding:"2px 8px"}}>↩ UNDO</button>
    </div>

    {flash&&<div style={{background:flash.startsWith("✓")?C.green:flash.startsWith("↩")?`${C.red}88`:flash.startsWith("Tap")?`${C.red}cc`:`${C.navy}ee`,padding:"5px",textAlign:"center",fontSize:10,fontFamily:"monospace",color:C.white}}>{flash}</div>}

    {/* Event buttons — horizontal row */}
    <div style={{display:"flex",gap:4,padding:"6px 8px"}}>
      {EVENTS.map(ev=>{const s=evBtnStyle(ev);return <button key={ev.id} onClick={()=>handleEventTap(ev)} style={{flex:1,padding:"12px 2px",...s,borderRadius:8,cursor:"pointer",fontSize:10,fontWeight:700,fontFamily:"monospace",textAlign:"center",transition:"all 0.15s"}}>{ev.l}</button>})}
    </div>

    {/* Main content area — changes based on state */}
    <div style={{flex:1,display:"flex",flexDirection:"column",padding:"0 8px",minHeight:0,overflow:"auto"}}>

      {/* PITCH — only visible when a pitch-event needs a location */}
      {showPitch&&<div style={{padding:"4px 0"}}>
        <div style={{borderRadius:10,overflow:"hidden",border:`1px solid ${C.border}`,aspectRatio:"360/220"}}>
          <GaaPitch/>
        </div>
      </div>}

      {/* OUTCOMES — show when event selected and (no pitch needed OR location set) */}
      {showOutcomes&&<div style={{padding:"8px 0"}}>
        <div style={{fontSize:9,fontFamily:"monospace",color:tc,marginBottom:6,textAlign:"center"}}>{activeTeam==="h"?"HOME":"OPP"} — {activeEv.l.toUpperCase()} {pendingLoc?"@ LOCATION SET":""}  — SELECT OUTCOME</div>
        <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(activeEv.outcomes.length,3)},1fr)`,gap:6}}>
          {activeEv.outcomes.map(o=><button key={o} onClick={()=>selectOutcome(o)} style={{padding:"14px 4px",background:C.bgCard,border:`1px solid ${tc}44`,borderRadius:10,color:tc,cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"monospace"}}>{o}</button>)}
        </div>
      </div>}

      {/* SUB — player off picker */}
      {showSubOff&&<div style={{padding:"8px 0"}}>
        <div style={{fontSize:9,fontFamily:"monospace",color:tc,marginBottom:6,textAlign:"center"}}>{activeTeam==="h"?"HOME":"OPP"} — SUB: TAP PLAYER COMING OFF</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:5}}>
          {Array.from({length:15},(_,i)=>{const num=i+1;return <button key={i} onClick={()=>setPendingOutcome(`#${num} off`)} style={{padding:"14px 2px",background:`${tc}11`,border:`1px solid ${tc}44`,borderRadius:8,color:tc,cursor:"pointer",fontSize:15,fontWeight:700,fontFamily:"monospace",textAlign:"center"}}>{num}</button>})}
        </div>
      </div>}

      {/* PLAYER NUMBERS — show when waiting for player attribution */}
      {pendingOutcome&&(()=>{
        const koLost=activeEv?.id==="kickout"&&(pendingOutcome==="Lost Clean"||pendingOutcome==="Break Lost");
        const attrTeam=koLost?(activeTeam==="h"?"a":"h"):activeTeam;
        const attrLabel=attrTeam==="h"?"HOME":"OPP";
        const attrCol=attrTeam==="h"?C.blue:C.gold;
        return <div style={{padding:"8px 0"}}>
        <div style={{fontSize:9,fontFamily:"monospace",color:attrCol,marginBottom:6,textAlign:"center"}}>{attrLabel} — {koLost?"KICKOUT LOST — WHO WON IT?":`${activeEv?.l}: ${pendingOutcome}`} — {activeEv?.id==="sub"?"TAP PLAYER COMING ON":"TAP PLAYER # OR NEXT EVENT"}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:5}}>
          {attrTeam==="h"
            ?squad.filter(s=>s.pid).map((s,i)=>{const pl=PANEL.find(p=>p.id===s.pid);const num=pl?.num||(i+1);const short=pl?pl.n.split(' ').pop():'';return <button key={i} onClick={()=>commitEvent(num)} style={{padding:"8px 2px",background:`${attrCol}11`,border:`1px solid ${attrCol}44`,borderRadius:8,color:attrCol,cursor:"pointer",textAlign:"center"}}><div style={{fontSize:14,fontWeight:700,fontFamily:"monospace"}}>{num}</div><div style={{fontSize:7,fontFamily:"monospace",marginTop:2,opacity:0.8}}>{short}</div></button>})
            :Array.from({length:15},(_,i)=>{const num=i+1;return <button key={i} onClick={()=>commitEvent(num)} style={{padding:"14px 2px",background:`${attrCol}11`,border:`1px solid ${attrCol}44`,borderRadius:8,color:attrCol,cursor:"pointer",fontSize:15,fontWeight:700,fontFamily:"monospace",textAlign:"center"}}>{num}</button>})}
        </div>
      </div>})()}

      {/* IDLE STATE — no event active, show event feed */}
      {!activeEv&&!pendingOutcome&&<div style={{padding:"8px 0",flex:1}}>
        {tagged.length===0?<div style={{textAlign:"center",padding:"40px 0"}}>
          <div style={{fontSize:28,marginBottom:12}}>🎯</div>
          <div style={{fontSize:13,color:C.slate,fontFamily:"monospace"}}>TAP AN EVENT TO START TAGGING</div>
          <div style={{fontSize:10,color:C.slate,fontFamily:"monospace",marginTop:6}}>Single tap = Home · Double tap = Opposition</div>
        </div>:
        <div>
          <div style={{fontSize:9,fontFamily:"monospace",color:C.slate,marginBottom:8}}>EVENT FEED — {tagged.length} TAGGED</div>
          <div style={{maxHeight:300,overflowY:"auto"}}>
            {tagged.slice(0,12).map(t=><div key={t.id} style={{padding:"8px 12px",marginBottom:3,background:C.bgCard,borderRadius:6,borderLeft:`3px solid ${t.team==="h"?C.blue:C.gold}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:11,fontFamily:"monospace",color:C.white}}><span style={{color:C.slate}}>{fmt(t.time)}</span> {t.evL}</div>
              <div style={{fontSize:11,fontFamily:"monospace",fontWeight:700,color:["Point","2-Pointer","Goal"].includes(t.outcome)?NEON.green:t.outcome==="Wide"?NEON.red:C.slate}}>{t.outcome}{t.player?` #${t.player}`:""}</div>
            </div>)}
          </div>
        </div>}
      </div>}
    </div>

    {/* Bottom bar */}
    <div style={{padding:"8px 12px",borderTop:`1px solid ${C.border}`,display:"flex",gap:8}}>
      <button onClick={()=>{if(pendingOutcome&&activeEv)commitEvent(null);MATCH.tagged=tagged;MATCH.score=score;if(period===1){MATCH.period=2;MATCH.clock=0;syncLive("half_time");setRunning(false);nav("halftime")}else{syncLive("full_time");setRunning(false);nav("fulltime")}}} style={{flex:2,padding:"12px",background:"linear-gradient(90deg,#1e5c38,#152d52)",border:`1px solid ${C.greenB}`,borderRadius:10,color:C.white,cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"monospace"}}>{period===1?"HALF TIME":"FULL TIME"}</button>
      <button onClick={()=>nav("home")} style={{flex:1,padding:"12px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:10,color:C.slate,cursor:"pointer",fontSize:12,fontFamily:"monospace"}}>EXIT</button>
    </div>
  </div>
}

// ── HALF TIME / FULL TIME STATS — computed live from MATCH store ──
function StatsScreen({nav,isFullTime=false}){
  const ev=MATCH.tagged;
  const score=MATCH.score;
  const fmtGAA=s=>`${s.g}-${String(s.p).padStart(2,"0")} (${s.fg}-${String(s.fp).padStart(2,"0")})`;
  const isScoreOutcome=o=>["Point","2-Pointer","Goal"].includes(o);
  const ptVal=o=>o==="Goal"?3:o==="2-Pointer"?2:o==="Point"?1:0;

  // Per-team computed stats
  const T=t=>{
    const shots=ev.filter(e=>e.team===t&&(e.ev==="shot"||e.ev==="free"));
    const scores=shots.filter(e=>isScoreOutcome(e.outcome));
    const fromPlay=ev.filter(e=>e.team===t&&e.ev==="shot"&&isScoreOutcome(e.outcome));
    const frees=ev.filter(e=>e.team===t&&e.ev==="free");
    const freeScores=frees.filter(e=>isScoreOutcome(e.outcome));
    const ko=ev.filter(e=>e.team===t&&e.ev==="kickout");
    const koWon=ko.filter(e=>["Won Clean","Break Won"].includes(e.outcome));
    const to=ev.filter(e=>e.team===t&&e.ev==="poss_lost");
    const tk=ev.filter(e=>e.team===t&&e.ev==="tackle"&&e.outcome==="Won");
    const wides=shots.filter(e=>e.outcome==="Wide");
    const yc=ev.filter(e=>e.team===t&&e.ev==="booking"&&e.outcome==="Yellow");
    const bc=ev.filter(e=>e.team===t&&e.ev==="booking"&&e.outcome==="Black");
    const fpG=fromPlay.filter(e=>e.outcome==="Goal").length;
    const fpP=fromPlay.reduce((a,e)=>a+(e.outcome==="Goal"?0:ptVal(e.outcome)),0);
    return {shots,scores,frees,freeScores,ko,koWon,to,tk,wides,yc,bc,fpG,fpP,
      conv:shots.length?Math.round(scores.length/shots.length*100):0};
  };
  const h=T("h"),a=T("a");

  // Estimated possessions from event chain: kickouts, turnovers, tackles and shots flip/end possession
  const poss=(()=>{
    const sorted=[...ev].sort((x,y)=>x.time-y.time);
    let cur=null;const count={h:0,a:0};const shotsIn={h:0,a:0};
    const start=t=>{if(t!==cur){cur=t;count[t]++}};
    sorted.forEach(e=>{
      const other=e.team==="h"?"a":"h";
      if(e.ev==="kickout"){start(["Won Clean","Break Won"].includes(e.outcome)?e.team:other)}
      else if(e.ev==="shot"||e.ev==="free"){if(cur!==e.team)start(e.team);shotsIn[e.team]++;cur=null}
      else if(e.ev==="poss_lost"){if(cur!==e.team)count[e.team]++;start(other)}
    });
    return {count,shotsIn,
      rate:t=>count[t]?Math.round(shotsIn[t]/count[t]*100):0};
  })();

  // Scorers grouped by player number
  const scorers=t=>{
    const m={};
    ev.filter(e=>e.team===t&&isScoreOutcome(e.outcome)).forEach(e=>{
      const k=e.player?`#${e.player}`:"Unattributed";
      m[k]=m[k]||{g:0,p:0,fg:0,fp:0};
      if(e.outcome==="Goal"){m[k].g++;if(e.ev==="free")m[k].fg++}
      else{const v=ptVal(e.outcome);m[k].p+=v;if(e.ev==="free")m[k].fp+=v}
    });
    return Object.entries(m).map(([n,s])=>({n,...s})).sort((x,y)=>(y.g*3+y.p)-(x.g*3+x.p));
  };
  const hScorers=scorers("h"),aScorers=scorers("a");

  // Turnover leaderboard
  const toBoard=(()=>{
    const m={};
    ev.filter(e=>e.ev==="poss_lost").forEach(e=>{
      const k=`${e.team}|${e.player?`#${e.player}`:"Unattributed"}`;
      m[k]=(m[k]||0)+1;
    });
    return Object.entries(m).map(([k,count])=>{const[team,n]=k.split("|");return{team,n,count}}).sort((x,y)=>y.count-x.count).slice(0,8);
  })();

  // Score timeline (cumulative points)
  const timeline=(()=>{
    const scoring=ev.filter(e=>isScoreOutcome(e.outcome)).sort((x,y)=>x.time-y.time);
    let ch=0,ca=0;
    return scoring.map(e=>{
      const v=ptVal(e.outcome);
      if(e.team==="h")ch+=v;else ca+=v;
      return{m:Math.floor(e.time/60),h:ch,a:ca};
    });
  })();
  const maxMin=Math.max(isFullTime?60:30,...timeline.map(t=>t.m),1);
  const maxPts=Math.max(...timeline.map(t=>Math.max(t.h,t.a)),1);

  // Shot map: fold tagger coords (vertical pitch, y=long axis) onto one goal
  const shotDots=ev.filter(e=>(e.ev==="shot"||e.ev==="free")&&e.loc).map(e=>{
    const tx=e.loc.x,ty=e.loc.y;
    let ax,side;
    if(tx>0.5){ax=tx;side=ty}else{ax=1-tx;side=1-ty}
    const code=e.outcome==="Goal"?"G":e.outcome==="2-Pointer"?"2":e.outcome==="Point"?"P":e.outcome==="Wide"?"W":"S";
    return{team:e.team,d:[ax,side,code]};
  });

  const stats=[
    {l:"Possessions (est)",h:poss.count.h,a:poss.count.a},
    {l:"Shot per Possession",h:`${poss.rate("h")}%`,a:`${poss.rate("a")}%`},
    {l:"Scoring Chances",h:h.shots.length,a:a.shots.length},
    {l:"Conversion Rate",h:`${h.conv}%`,a:`${a.conv}%`},
    {l:"Scores From Play",h:`${h.fpG}-${String(h.fpP).padStart(2,"0")}`,a:`${a.fpG}-${String(a.fpP).padStart(2,"0")}`},

    {l:"Turnovers",h:h.to.length,a:a.to.length},

  if(h.ko.length>=3)aiLines.push({c:h.koWon.length/h.ko.length>=0.7?C.greenB:C.red,t:`Kickout retention at ${Math.round(h.koWon.length/Math.max(h.ko.length,1)*100)}% (${h.koWon.length}/${h.ko.length}).`});

  if(aiLines.length===0)aiLines.push({c:C.slate,t:"Tag more events to unlock tactical insights."});

  return <div style={{minHeight:"100vh",background:C.bg,color:C.white,fontFamily:"Inter,-apple-system,system-ui,sans-serif",paddingBottom:40}}>
    <div style={{background:isFullTime?"linear-gradient(90deg,#1a0a0a,#0a1020)":"linear-gradient(90deg,#0a1628,#0d1f3c)",padding:"14px 16px",textAlign:"center",borderBottom:`1px solid ${C.border}`}}>

          <div style={{fontSize:20,fontWeight:900,fontFamily:"monospace"}}>{fmtGAA(score.h)}</div>
        </div>
        <div style={{fontSize:10,color:C.slate,fontFamily:"monospace"}}>vs</div>
        <div style={{textAlign:"center"}}>

    <div style={{padding:"12px 16px",maxWidth:480,margin:"0 auto"}}>
      {ev.length===0&&<div style={{textAlign:"center",padding:"30px 0",color:C.slate,fontFamily:"monospace",fontSize:11}}>NO EVENTS TAGGED YET — STATS BUILD AS YOU TAG</div>}

      {timeline.length>0&&<>

          {[0,maxPts].map((v,i)=><text key={i} x="25" y={85-((v/maxPts)*75)+3} fill={C.slate} fontSize="7" fontFamily="monospace" textAnchor="end">{v}</text>)}
          <polyline fill="none" stroke={C.blue} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" points={["30,85",...timeline.map(t=>`${30+(t.m/maxMin)*265},${85-(t.h/maxPts)*75}`)].join(" ")}/>
          <polyline fill="none" stroke={C.gold} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" points={["30,85",...timeline.map(t=>`${30+(t.m/maxMin)*265},${85-(t.a/maxPts)*75}`)].join(" ")}/>
          {timeline.map((t,i)=><g key={i}><circle cx={30+(t.m/maxMin)*265} cy={85-(t.h/maxPts)*75} r="2.5" fill={C.blue}/><circle cx={30+(t.m/maxMin)*265} cy={85-(t.a/maxPts)*75} r="2.5" fill={C.gold}/></g>)}
        </svg>
        <div style={{display:"flex",justifyContent:"center",gap:16,marginTop:4}}>
          <span style={{fontSize:9,fontFamily:"monospace",color:C.blue}}>● Bray Emmets</span>
          <span style={{fontSize:9,fontFamily:"monospace",color:C.gold}}>● Opposition</span>
        </div>
      </div>

      {(hScorers.length>0||aScorers.length>0)&&<>
      <SL>SCORERS</SL>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <div style={{flex:1,background:C.bgCard,borderRadius:10,border:`1px solid ${C.border}`,padding:12}}>

      <div style={{background:C.bgCard,borderRadius:12,border:`1px solid ${C.border}`,padding:14,marginBottom:16}}>

          <div style={{flex:1.5,textAlign:"center",fontSize:10,color:C.slate,fontFamily:"monospace"}}>{s.l}</div>

      {toBoard.length>0&&<>

          <div style={{width:20,fontSize:11,fontWeight:700,fontFamily:"monospace",color:C.red,textAlign:"right"}}>{p.count}</div>
        </div>})}

      {shotDots.length>0&&<>
      <SL>SHOT MAP — ALL ATTACKING TOP GOAL</SL>
      <div style={{background:C.bgCard,borderRadius:12,border:`1px solid ${C.border}`,padding:14,marginBottom:16}}>

              <SeasonPitch data={shotDots.filter(s=>s.team===t).map(s=>s.d)} mode="shots"/>
            </div>

        <div style={{display:"flex",justifyContent:"center",gap:16,marginTop:10}}>
          {[["Score",NEON.green],["Goal",NEON.purple],["Miss",NEON.red]].map(([l,c])=><div key={l} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,fontFamily:"monospace",color:C.slate}}><div style={{width:8,height:8,borderRadius:"50%",background:c,boxShadow:`0 0 5px ${c}`}}/>{l}</div>)}

      <SL>{isFullTime?"MATCH ANALYSIS":"TACTICAL GUIDANCE"}</SL>
      <div style={{background:"linear-gradient(135deg,#0f3a25,#0a1e10)",borderRadius:12,border:`1px solid ${C.greenB}44`,padding:16,marginBottom:16}}>

          {aiLines.map((l,i)=><div key={i} style={{marginBottom:6}}><span style={{color:l.c,fontWeight:700}}>{i+1}.</span> {l.t}</div>)}

      <div style={{display:"flex",gap:8}}>
        {isFullTime?<>
          <Btn onClick={()=>{
            const rows=[["Event","Time","Period","Team","Type","Outcome","Player","LocX","LocY"]];
            [...MATCH.tagged].reverse().forEach((e,i)=>rows.push([i+1,`${String(Math.floor(e.time/60)).padStart(2,"0")}:${String(e.time%60).padStart(2,"0")}`,e.period,e.team==="h"?"Bray Emmets":"Opposition",e.evL,e.outcome,e.player||"",e.loc?e.loc.x.toFixed(3):"",e.loc?e.loc.y.toFixed(3):""]));
            const csv=rows.map(r=>r.join(",")).join("\n");
            if(navigator.clipboard)navigator.clipboard.writeText(csv);

        </>:<>
          <Btn onClick={()=>{syncLive("second_half");nav("tagger")}} style={{flex:2}}>RESUME — 2ND HALF →</Btn>
          <Btn onClick={()=>nav("home")} variant="secondary" style={{flex:1}}>EXIT</Btn>
        </>}
      </div>
    </div>
  </div>
}

// ── PITCH MAPS TAB — season-level maps from imported data ──
// Vertical pitch, all events normalised to attack the TOP goal
function SeasonPitch({data,mode,zones}){
  // data: [x, y, code]. All folded onto one goal (shots: x>0.5; KOs: x<0.6 from own goal)
  const half=mode!=="ko"; // shots use attacking half only
  const W=240,H=half?200:360,L=10,R=230,T=10,B=half?190:350,MX=120;
  const LN="rgba(255,255,255,0.5)",LN2="rgba(255,255,255,0.28)",LN3="rgba(255,255,255,0.15)";
  const GI=36,GO=50,GW=8;
  const colFor=c=>{
    if(mode==="ko")return c==="W"?NEON.green:NEON.red;
    if(c==="G")return NEON.purple;
    if(c==="P"||c==="2")return NEON.green;
    return NEON.red;
  };
  if(half){
    // Attacking half: x 0.5..1 maps bottom..top. Goal at top. Official proportions.
    const y=f=>T+((1-f)/0.5)*(B-T); // folded-x → py
    const y13=y(0.907),y20=y(0.857),yD=y(0.764),yARC=y(0.714),y45=y(0.679),y65=y(0.536);
    const SR=15,LR=44; // small/large rect half-widths
    return <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",display:"block"}}>
      <rect x="0" y="0" width={W} height={H} fill={C.bg}/>
      <rect x={L} y={T} width={R-L} height={B-T} fill="none" stroke={LN} strokeWidth="2" rx="2"/>
      <line x1={L} y1={B} x2={R} y2={B} stroke={LN2} strokeWidth="1.5" strokeDasharray="8,5"/>
      {/* Small + large rectangles */}
      <rect x={MX-SR} y={T} width={SR*2} height={12} fill="none" stroke={LN} strokeWidth="1.2"/>
      <rect x={MX-LR} y={T} width={LR*2} height={y13-T} fill="none" stroke={LN} strokeWidth="1.2"/>
      {/* 13m line (outside the large rect only) */}
      <line x1={L} y1={y13} x2={MX-LR} y2={y13} stroke={LN2} strokeWidth="1"/>
      <line x1={MX+LR} y1={y13} x2={R} y2={y13} stroke={LN2} strokeWidth="1"/>
      {/* 20m line */}
      <line x1={L} y1={y20} x2={R} y2={y20} stroke={LN} strokeWidth="1.5"/>
      {/* 45m + 65m */}
      <line x1={L} y1={y45} x2={R} y2={y45} stroke={LN} strokeWidth="1.2"/>
      <line x1={L} y1={y65} x2={R} y2={y65} stroke={LN2} strokeWidth="1"/>
      {/* BIG 40m arc — sideline to sideline, apex inside the 45 */}
      <path d={`M${L+4},${y13} Q${MX},${2*yARC-y13} ${R-4},${y13}`} fill="none" stroke={LN} strokeWidth="2"/>
      {/* Small D — 13m semicircle off the 20m line */}
      <path d={`M${MX-30},${y20} Q${MX},${2*yD-y20} ${MX+30},${y20}`} fill="none" stroke={LN} strokeWidth="1.3"/>
      {/* Goalposts */}
      <line x1={MX-16} y1={T-2} x2={MX+16} y2={T-2} stroke="#fff" strokeWidth="3" strokeLinecap="round"/>
      {zones&&zones.map((z,i)=>{
        const yTop=y(z.toX);
        const yBot=y(z.fromX);
        const col=z.pct>=60?NEON.green:z.pct>=45?"#ffdd00":NEON.red;
        return <g key={i}>
          <rect x={L} y={yTop} width={R-L} height={yBot-yTop} fill={col} opacity="0.07"/>
          <line x1={L} y1={yBot} x2={R} y2={yBot} stroke={col} strokeWidth="0.6" opacity="0.4" strokeDasharray="3,3"/>
          <rect x={R-58} y={yTop+4} width="52" height="22" rx="4" fill={C.bg} opacity="0.85"/>
          <text x={R-32} y={yTop+13} fill={col} fontSize="9" fontWeight="900" fontFamily="monospace" textAnchor="middle">{z.pct}%</text>
          <text x={R-32} y={yTop+22} fill={C.slate} fontSize="5.5" fontFamily="monospace" textAnchor="middle">{z.label} · {z.n}</text>
        </g>
      })}
      {data.map((d,i)=>{
        if(d[0]<0.5)return null;
        const px=L+(d[1]*(R-L));
        const py=y(d[0]);
        return <circle key={i} cx={px} cy={py} r="3.5" fill={colFor(d[2])} opacity="0.55" stroke="rgba(255,255,255,0.3)" strokeWidth="0.3"/>
      })}
    </svg>
  }
  // Full pitch for kickouts — own goal at bottom, official layout both ends
  const yTop=f=>T+f*(B-T), yBot=f=>B-f*(B-T); // f = fraction of pitch length from that end
  const SR=15,LR=44;
  const ends=[{e:T,y:yTop,sgn:1},{e:B,y:yBot,sgn:-1}];
  return <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",display:"block"}}>
    <rect x="0" y="0" width={W} height={H} fill={C.bg}/>
    <rect x={L} y={T} width={R-L} height={B-T} fill="none" stroke={LN} strokeWidth="2" rx="2"/>
    <line x1={L} y1={(T+B)/2} x2={R} y2={(T+B)/2} stroke={LN2} strokeWidth="1.5" strokeDasharray="8,5"/>
    {ends.map((en,k)=>{
      const y13=en.y(0.093),y20=en.y(0.143),yD=en.y(0.236),yARC=en.y(0.286),y45=en.y(0.321),y65=en.y(0.464);
      return <g key={k}>
        <rect x={MX-SR} y={Math.min(en.e,en.e+en.sgn*10)} width={SR*2} height={10} fill="none" stroke={LN} strokeWidth="1"/>
        <rect x={MX-LR} y={Math.min(en.e,y13)} width={LR*2} height={Math.abs(y13-en.e)} fill="none" stroke={LN} strokeWidth="1"/>
        <line x1={L} y1={y13} x2={MX-LR} y2={y13} stroke={LN2} strokeWidth="0.8"/>
        <line x1={MX+LR} y1={y13} x2={R} y2={y13} stroke={LN2} strokeWidth="0.8"/>
        <line x1={L} y1={y20} x2={R} y2={y20} stroke={LN} strokeWidth="1.3"/>
        <line x1={L} y1={y45} x2={R} y2={y45} stroke={LN} strokeWidth="1"/>
        <line x1={L} y1={y65} x2={R} y2={y65} stroke={LN2} strokeWidth="0.8"/>
        <path d={`M${L+4},${y13} Q${MX},${2*yARC-y13} ${R-4},${y13}`} fill="none" stroke={LN} strokeWidth="1.6"/>
        <path d={`M${MX-26},${y20} Q${MX},${2*yD-y20} ${MX+26},${y20}`} fill="none" stroke={LN} strokeWidth="1.1"/>
        <line x1={MX-16} y1={en.e-en.sgn*2} x2={MX+16} y2={en.e-en.sgn*2} stroke="#fff" strokeWidth="3" strokeLinecap="round"/>
      </g>
    })}
    {data.map((d,i)=>{
      const px=L+(d[1]*(R-L));
      const py=T+((1-d[0])*(B-T));
      return <circle key={i} cx={px} cy={py} r="3" fill={colFor(d[2])} opacity="0.55" stroke="rgba(255,255,255,0.3)" strokeWidth="0.3"/>
    })}
  </svg>
}
function PitchMapsTab({yr="all"}){
  const [view,setView]=useState("shots");
  const [showZones,setShowZones]=useState(true);
  const [halfF,setHalfF]=useState("all"); // all | 1 | 2

  const yfilt=arr=>yr==="all"?arr:arr.filter(d=>d[4]===(yr==="y25"?1:2));
  const filt=arr=>{const a=yfilt(arr);return halfF==="all"?a:a.filter(d=>d[3]===Number(halfF))};
  const hs=filt(HS),os=filt(OS),hk=filt(HK);
  const isSc=c=>["P","G","2"].includes(c);
  const hsScores=hs.filter(s=>isSc(s[2])).length;
  const osScores=os.filter(s=>isSc(s[2])).length;
  const koWon=hk.filter(k=>k[2]==="W").length;

  // Zone conversion: inside D (x≥0.855), D→45 (0.69–0.855), beyond 45 (0.5–0.69)
  const zonesFor=arr=>{
    const defs=[{fromX:0.764,toX:1,label:"INSIDE D"},{fromX:0.714,toX:0.764,label:"D TO ARC"},{fromX:0.5,toX:0.714,label:"2PT ZONE"}];
    return defs.map(z=>{
      const inZ=arr.filter(d=>d[0]>=z.fromX&&d[0]<z.toX||z.toX===1&&d[0]>=z.fromX);
      const sc=inZ.filter(d=>isSc(d[2])).length;
      return {...z,n:inZ.length,pct:inZ.length?Math.round(sc/inZ.length*100):0};
    });
  };

  // Kickout zone grid: rows Short/Mid/Long (x), cols Left/Centre/Right (y)
  const koGrid=(()=>{
    const rows=[{l:"Short",f:x=>x<0.25},{l:"Mid",f:x=>x>=0.25&&x<0.45},{l:"Long",f:x=>x>=0.45}];
    const cols=[{l:"Left",f:y=>y<0.33},{l:"Centre",f:y=>y>=0.33&&y<0.66},{l:"Right",f:y=>y>=0.66}];
    return rows.map(r=>cols.map(c=>{
      const cell=hk.filter(k=>r.f(k[0])&&c.f(k[1]));
      const w=cell.filter(k=>k[2]==="W").length;
      return {n:cell.length,pct:cell.length?Math.round(w/cell.length*100):null};
    }));
  })();

          const sc=find(scoringLeaders),tk=find(tackleLeaders),to=find(turnoverLeaders),ef=find(SD.eff);
          return <>
            <select value={player||""} onChange={e=>setPlayer(e.target.value||null)} style={{width:"100%",background:C.bgDark,border:`1px solid ${C.border}`,borderRadius:8,padding:"12px 14px",color:C.white,fontSize:13,boxSizing:"border-box",outline:"none",fontFamily:"Inter,-apple-system,system-ui,sans-serif",marginBottom:16,appearance:"none"}}>
              <option value="">— Select a player —</option>
              {allNames.map(n=><option key={n} value={n}>{n}</option>)}
            </select>
            {player&&<div style={{background:C.bgCard,borderRadius:12,border:`1px solid ${C.greenB}44`,padding:16,marginBottom:16}}>
              <div style={{fontSize:16,fontWeight:900,marginBottom:2}}>{player}</div>
              <div style={{fontSize:9,fontFamily:"monospace",color:C.slate,marginBottom:12}}>{(sc?.apps||tk?.apps||to?.apps||0)} APPS · {yr==="all"?"ALL TIME":yr==="y25"?"2025":"2026"}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                <div style={{background:C.bgDark,borderRadius:8,padding:10,textAlign:"center"}}>
                  <div style={{fontSize:16,fontWeight:900,fontFamily:"monospace",color:C.greenB}}>{sc?`${sc.g}-${String(sc.p).padStart(2,"0")}`:"—"}</div>
                  <div style={{fontSize:8,fontFamily:"monospace",color:C.slate,marginTop:2}}>SCORED{sc?` (${sc.fg}-${String(sc.fp).padStart(2,"0")} f)`:""}</div>
                </div>
                <div style={{background:C.bgDark,borderRadius:8,padding:10,textAlign:"center"}}>
                  <div style={{fontSize:16,fontWeight:900,fontFamily:"monospace",color:ef?(ef.pct>=60?C.greenB:ef.pct>=50?C.gold:C.red):C.slate}}>{ef?`${ef.pct}%`:"—"}</div>
                  <div style={{fontSize:8,fontFamily:"monospace",color:C.slate,marginTop:2}}>{ef?`SHOT EFF (${ef.s}/${ef.t})`:"SHOT EFF"}</div>
                </div>
                <div style={{background:C.bgDark,borderRadius:8,padding:10,textAlign:"center"}}>
                  <div style={{fontSize:16,fontWeight:900,fontFamily:"monospace",color:C.blue}}>{tk?tk.count:"—"}</div>
                  <div style={{fontSize:8,fontFamily:"monospace",color:C.slate,marginTop:2}}>TACKLES{tk?.bl>0?` (${tk.bl} blk)`:""}</div>
                </div>
                <div style={{background:C.bgDark,borderRadius:8,padding:10,textAlign:"center"}}>
                  <div style={{fontSize:16,fontWeight:900,fontFamily:"monospace",color:C.red}}>{to?to.count:"—"}</div>
                  <div style={{fontSize:8,fontFamily:"monospace",color:C.slate,marginTop:2}}>TURNOVERS</div>
                </div>
                <div style={{background:C.bgDark,borderRadius:8,padding:10,textAlign:"center"}}>
                  <div style={{fontSize:16,fontWeight:900,fontFamily:"monospace",color:C.white}}>{sc?(sc.g*3+sc.p):"—"}</div>
                  <div style={{fontSize:8,fontFamily:"monospace",color:C.slate,marginTop:2}}>TOTAL PTS</div>
                </div>
                <div style={{background:C.bgDark,borderRadius:8,padding:10,textAlign:"center"}}>
                  <div style={{fontSize:16,fontWeight:900,fontFamily:"monospace",color:C.gold}}>{sc?Math.round((sc.g*3+sc.p)/sc.apps*10)/10:"—"}</div>
                  <div style={{fontSize:8,fontFamily:"monospace",color:C.slate,marginTop:2}}>PTS / GAME</div>
                </div>
              </div>
            </div>}
          </>
        })()}


        <SL>POSITION BENCHMARKING <span style={{color:C.gold}}>· DEMO DATA</span></SL>
        <div style={{fontSize:9,fontFamily:"monospace",color:C.slate,marginBottom:10,lineHeight:1.6}}>How Bray's lines compare to the Wicklow average for that position (county baseline from 11 illustrative club seasons).</div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
          {BRAY_POS_BENCH.map((b,i)=>{
            const cb=POS_BENCH.find(p=>p.pos===b.pos);
            const Row=({l,bv,cv,suffix=""})=>{
              const diff=bv-cv;const up=diff>0;
              return <div style={{display:"flex",alignItems:"center",padding:"4px 0"}}>
                <div style={{flex:1.4,fontSize:9,fontFamily:"monospace",color:C.slate}}>{l}</div>
                <div style={{flex:1,textAlign:"center",fontSize:12,fontWeight:700,fontFamily:"monospace",color:C.blue}}>{bv}{suffix}</div>
                <div style={{flex:1,textAlign:"center",fontSize:9,fontFamily:"monospace",color:up?C.greenB:C.red}}>{up?"▲":"▼"} {Math.abs(Math.round(diff*10)/10)}{suffix}</div>
                <div style={{flex:1,textAlign:"center",fontSize:12,fontFamily:"monospace",color:C.gold}}>{cv}{suffix}</div>
              </div>
            };
            return <div key={b.pos} style={{background:C.bgCard,borderRadius:12,border:`1px solid ${C.border}`,padding:14}}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:6}}>{b.pos}</div>
              <div style={{display:"flex",fontSize:8,fontFamily:"monospace",color:C.slate,fontWeight:700,paddingBottom:4,borderBottom:`1px solid ${C.borderB}`,marginBottom:2}}>
                <div style={{flex:1.4}}></div><div style={{flex:1,textAlign:"center",color:C.blue}}>BRAY</div><div style={{flex:1,textAlign:"center"}}>DIFF</div><div style={{flex:1,textAlign:"center",color:C.gold}}>CO. AVG</div>
              </div>
              <Row l="Points / game" bv={b.pts} cv={cb.pts}/>
              <Row l="Shot %" bv={b.shot} cv={cb.shot} suffix="%"/>
              <Row l="Tackles / game" bv={b.tk} cv={cb.tk}/>
              <Row l="Turnovers / game" bv={b.to} cv={cb.to}/>
            </div>
          })}
          <div style={{background:C.bgCard,borderRadius:12,border:`1px solid ${C.border}`,padding:14,opacity:0.6}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>Goalkeeper</div>
            <div style={{fontSize:9,fontFamily:"monospace",color:C.slate}}>Not enough position-tagged data yet for Bray's keeper — tag goalkeeper events in upcoming matches to unlock this comparison (county avg: KO {POS_BENCH.find(p=>p.pos==="Goalkeeper").ko}%, {POS_BENCH.find(p=>p.pos==="Goalkeeper").sv} saves/game).</div>
          </div>
        </div>

        <SL>TOP SCORERS</SL>
        <div style={{background:C.bgCard,borderRadius:12,border:`1px solid ${C.border}`,padding:14,marginBottom:16}}>
          {scoringLeaders.map((p,i)=>{const pts=p.g*3+p.p;return <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:i<scoringLeaders.length-1?`1px solid ${C.border}`:"none"}}>
            <div style={{width:20,fontSize:12,fontWeight:900,fontFamily:"monospace",color:i<3?C.gold:C.slate,textAlign:"center"}}>{i+1}</div>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>{p.n}</div><div style={{fontSize:9,fontFamily:"monospace",color:C.slate}}>{p.apps} apps</div></div>
            <div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:700,fontFamily:"monospace",color:C.greenB}}>{p.g}-{String(p.p).padStart(2,"0")}</div><div style={{fontSize:9,fontFamily:"monospace",color:C.slate}}>({p.fg}-{String(p.fp).padStart(2,"0")})</div></div>
            <div style={{width:30,textAlign:"right",fontSize:12,fontWeight:900,fontFamily:"monospace",color:C.blue}}>{pts}</div>
          </div>})}
        </div>

        <SL>TACKLE LEADERS</SL>
        <div style={{background:C.bgCard,borderRadius:12,border:`1px solid ${C.border}`,padding:14,marginBottom:16}}>
          {tackleLeaders.map((p,i)=>{const max=tackleLeaders[0].count;return <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:i<tackleLeaders.length-1?`1px solid ${C.border}`:"none"}}>
            <div style={{width:20,fontSize:12,fontWeight:900,fontFamily:"monospace",color:i<3?C.gold:C.slate,textAlign:"center"}}>{i+1}</div>
            <div style={{flex:1,fontSize:12,fontWeight:i<3?700:400}}>{p.n} {p.bl>0&&<span style={{fontSize:9,color:C.blue,fontFamily:"monospace"}}>{p.bl} blk</span>}</div>
            <div style={{width:60,height:8,background:C.bgDark,borderRadius:4,overflow:"hidden"}}>
              <div style={{width:`${(p.count/max)*100}%`,height:"100%",background:C.greenB,borderRadius:4}}/>
            </div>
            <div style={{width:24,textAlign:"right",fontSize:12,fontWeight:700,fontFamily:"monospace",color:C.greenB}}>{p.count}</div>
          </div>})}
        </div>

        <SL>TURNOVER LEADERS</SL>
        <div style={{background:C.bgCard,borderRadius:12,border:`1px solid ${C.border}`,padding:14}}>
          <div style={{fontSize:9,fontFamily:"monospace",color:C.slate,marginBottom:8}}>WHO IS GIVING THE BALL AWAY</div>
          {turnoverLeaders.map((p,i)=>{const max=turnoverLeaders[0].count;return <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:i<turnoverLeaders.length-1?`1px solid ${C.border}`:"none"}}>
            <div style={{width:20,fontSize:12,fontWeight:900,fontFamily:"monospace",color:i<3?"#ff6b6b":C.slate,textAlign:"center"}}>{i+1}</div>
            <div style={{flex:1,fontSize:12,fontWeight:i<3?700:400}}>{p.n}</div>
            <div style={{width:70,height:8,background:C.bgDark,borderRadius:4,overflow:"hidden"}}>
              <div style={{width:`${(p.count/max)*100}%`,height:"100%",background:C.red,borderRadius:4}}/>
            </div>
            <div style={{width:24,textAlign:"right",fontSize:12,fontWeight:700,fontFamily:"monospace",color:C.red}}>{p.count}</div>
          </div>})}
        </div>

        <SL>SHOT EFFICIENCY</SL>
        <div style={{background:C.bgCard,borderRadius:12,border:`1px solid ${C.border}`,padding:14,marginBottom:16}}>
          <div style={{fontSize:9,fontFamily:"monospace",color:C.slate,marginBottom:8}}>SCORES / SHOTS — MIN {yr==="all"?10:6} SHOTS</div>
          {SD.eff.map((p,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:i<9?`1px solid ${C.border}`:"none"}}>
            <div style={{width:20,fontSize:12,fontWeight:900,fontFamily:"monospace",color:i<3?C.gold:C.slate,textAlign:"center"}}>{i+1}</div>
            <div style={{flex:1,fontSize:12,fontWeight:i<3?700:400}}>{p.n} <span style={{fontSize:9,color:C.slate,fontFamily:"monospace"}}>{p.s}/{p.t}</span></div>
            <div style={{width:70,height:8,background:C.bgDark,borderRadius:4,overflow:"hidden"}}>
              <div style={{width:`${p.pct}%`,height:"100%",background:p.pct>=60?C.greenB:p.pct>=50?C.gold:C.red,borderRadius:4}}/>
            </div>
            <div style={{width:34,textAlign:"right",fontSize:12,fontWeight:700,fontFamily:"monospace",color:p.pct>=60?C.greenB:p.pct>=50?C.gold:C.red}}>{p.pct}%</div>
          </div>)}
        </div>

        <SL>HOW WE LOSE THE BALL</SL>
        <div style={{background:C.bgCard,borderRadius:12,border:`1px solid ${C.border}`,padding:14}}>
          <div style={{fontSize:9,fontFamily:"monospace",color:C.slate,marginBottom:10}}>{SD.donut.reduce((a,s)=>a+s.v,0)} TURNOVERS — {SD.games} MATCHES</div>
          {(()=>{
            const slices=SD.donut;
            const total=slices.reduce((a,s)=>a+s.v,0);
            let acc=0;
            const R2=52,CX=70,CY=70,IR=30;
            return <div style={{display:"flex",alignItems:"center",gap:14}}>
              <svg viewBox="0 0 140 140" style={{width:130,flexShrink:0}}>
                {slices.map((s,i)=>{
                  const a0=(acc/total)*Math.PI*2-Math.PI/2;
                  acc+=s.v;
                  const a1=(acc/total)*Math.PI*2-Math.PI/2;
                  const large=(a1-a0)>Math.PI?1:0;
                  const x0=CX+R2*Math.cos(a0),y0=CY+R2*Math.sin(a0);
                  const x1=CX+R2*Math.cos(a1),y1=CY+R2*Math.sin(a1);
                  const xi1=CX+IR*Math.cos(a1),yi1=CY+IR*Math.sin(a1);
                  const xi0=CX+IR*Math.cos(a0),yi0=CY+IR*Math.sin(a0);
                  return <path key={i} d={`M${x0},${y0} A${R2},${R2} 0 ${large} 1 ${x1},${y1} L${xi1},${yi1} A${IR},${IR} 0 ${large} 0 ${xi0},${yi0} Z`} fill={s.c} opacity="0.85" stroke={C.bg} strokeWidth="1.5"/>
                })}
                <text x={CX} y={CY-2} fill={C.white} fontSize="16" fontWeight="900" fontFamily="monospace" textAnchor="middle">{total}</text>
                <text x={CX} y={CY+12} fill={C.slate} fontSize="7" fontFamily="monospace" textAnchor="middle">TOTAL</text>
              </svg>
              <div style={{flex:1}}>
                {slices.map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"3px 0"}}>
                  <div style={{width:9,height:9,borderRadius:2,background:s.c,flexShrink:0}}/>
                  <span style={{flex:1,fontSize:10,fontFamily:"monospace",color:C.white}}>{s.l}</span>
                  <span style={{fontSize:10,fontFamily:"monospace",fontWeight:700,color:s.c}}>{s.v}</span>
                  <span style={{fontSize:9,fontFamily:"monospace",color:C.slate,width:30,textAlign:"right"}}>{Math.round(s.v/total*100)}%</span>
                </div>)}
              </div>
            </div>
          })()}
        </div>
      </div>

      <div id="sec-pitch"><PitchMapsTab yr={yr}/></div>

      <div id="sec-opp">
        <SL>OPPOSITION RECORD — {yr==="all"?"ALL TIME":yr==="y25"?"2025":"2026"}</SL>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {oppData.map((o,i)=>{const rc=o.w>o.l?C.greenB:o.l>o.w?C.red:C.gold;const result=`${o.w}-${o.l}${o.d?`-${o.d}`:""}`;return <div key={i} style={{background:C.bgCard,borderRadius:10,border:`1px solid ${C.border}`,padding:14}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <MJ col1={OPP_TEAMS.find(t=>t.name===o.name)?.c1||"#666"} col2={OPP_TEAMS.find(t=>t.name===o.name)?.c2||"#fff"} size={22}/>
                <span style={{fontSize:13,fontWeight:700}}>{o.name}</span>
              </div>
              <span style={{fontSize:12,fontWeight:900,fontFamily:"monospace",color:rc}}>{result}</span>
            </div>
            <div style={{display:"flex",gap:16,fontSize:11,fontFamily:"monospace",color:C.slate}}>
              <span>P{o.p}</span><span style={{color:C.greenB}}>W{o.w}</span><span style={{color:C.red}}>L{o.l}</span><span style={{color:C.gold}}>D{o.d}</span>
            </div>
          </div>})}
        </div>
      </div>

      <div id="sec-bench">
        <SL>WICKLOW BENCHMARKING <span style={{color:C.gold}}>· DEMO DATA</span></SL>
        <div style={{fontSize:9,fontFamily:"monospace",color:C.slate,marginBottom:10,lineHeight:1.6}}>Bray Emmets is real (2025–2026 data). The other 11 clubs are illustrative — generated to show how county-wide benchmarking will work once more clubs are on Rock Solid.</div>
        <div style={{background:C.bgCard,borderRadius:12,border:`1px solid ${C.border}`,padding:14,marginBottom:16,overflowX:"auto"}}>
          <div style={{display:"flex",fontSize:8,fontFamily:"monospace",color:C.slate,fontWeight:700,padding:"0 0 6px",borderBottom:`1px solid ${C.borderB}`,minWidth:420}}>
            <div style={{flex:2.2}}>CLUB</div><div style={{flex:1,textAlign:"center"}}>PTS/G</div><div style={{flex:1,textAlign:"center"}}>CONV</div><div style={{flex:1,textAlign:"center"}}>KO%</div><div style={{flex:1,textAlign:"center"}}>TK/G</div><div style={{flex:1,textAlign:"center"}}>TO/G</div>
          </div>
          {CLUB_BENCH.map((c,i)=><div key={c.n} style={{display:"flex",alignItems:"center",fontSize:11,padding:"7px 0",borderBottom:i<CLUB_BENCH.length-1?`1px solid ${C.border}`:"none",background:c.real?`${C.green}10`:"transparent",minWidth:420}}>
            <div style={{flex:2.2,fontWeight:c.real?700:400,color:c.real?C.greenB:C.white,fontFamily:"monospace"}}>{i+1}. {c.n}{c.real&&" ●"}</div>
            <div style={{flex:1,textAlign:"center",fontFamily:"monospace",fontWeight:c.real?700:400}}>{c.pts}</div>
            <div style={{flex:1,textAlign:"center",fontFamily:"monospace"}}>{c.conv}%</div>
            <div style={{flex:1,textAlign:"center",fontFamily:"monospace"}}>{c.ko}%</div>
            <div style={{flex:1,textAlign:"center",fontFamily:"monospace"}}>{c.tk}</div>
            <div style={{flex:1,textAlign:"center",fontFamily:"monospace"}}>{c.to}</div>
          </div>)}
          <div style={{display:"flex",alignItems:"center",fontSize:11,padding:"7px 0",marginTop:4,borderTop:`1px solid ${C.borderB}`,minWidth:420}}>
            <div style={{flex:2.2,fontWeight:700,color:C.gold,fontFamily:"monospace"}}>WICKLOW AVG</div>
            <div style={{flex:1,textAlign:"center",fontFamily:"monospace",fontWeight:700,color:C.gold}}>{WICKLOW_AVG.pts}</div>
            <div style={{flex:1,textAlign:"center",fontFamily:"monospace",color:C.gold}}>{WICKLOW_AVG.conv}%</div>
            <div style={{flex:1,textAlign:"center",fontFamily:"monospace",color:C.gold}}>{WICKLOW_AVG.ko}%</div>
            <div style={{flex:1,textAlign:"center",fontFamily:"monospace",color:C.gold}}>{WICKLOW_AVG.tk}</div>
            <div style={{flex:1,textAlign:"center",fontFamily:"monospace",color:C.gold}}>{WICKLOW_AVG.to}</div>
          </div>
          <div style={{fontSize:8,fontFamily:"monospace",color:C.slate,marginTop:8,textAlign:"center"}}>● = REAL DATA · BRAY RANKS {CLUB_BENCH.findIndex(c=>c.real)+1} OF {CLUB_BENCH.length} ON PTS/GAME</div>
        </div>
      </div>

    </div>
  </div>
}

// ── APP SHELL ──
function App(){
  const [screen,setScreen]=useState("login");
  const screens={
    login:p=><LoginScreen {...p}/>,
    onboarding:p=><OnboardingScreen {...p}/>,
    home:p=><HomeScreen {...p}/>,
    prematch:p=><PreMatchScreen {...p}/>,
    tagger:p=><TaggerScreen {...p}/>,
    halftime:p=><StatsScreen {...p} isFullTime={false}/>,
    fulltime:p=><StatsScreen {...p} isFullTime={true}/>,
    leaderboards:p=><LeaderboardScreen {...p}/>,
  };
  return (screens[screen]||screens.login)({nav:setScreen});
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
